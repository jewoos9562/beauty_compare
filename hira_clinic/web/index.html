<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서울 피부과 의원 지도</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Leaflet core -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <header class="sidebar-header">
      <h1>
        <span class="logo">◉</span>
        서울 피부과 의원
      </h1>
      <p class="subtitle">HIRA 공식 등록 데이터 · <span id="total-count">0</span>곳</p>
    </header>

    <div class="controls">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18">
          <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M11 19a8 8 0 100-16 8 8 0 000 16zM21 21l-4.35-4.35" />
        </svg>
        <input id="search" type="text" placeholder="의원명 또는 주소 검색" />
      </div>

      <div class="filter-wrap">
        <label for="gu-filter">자치구</label>
        <select id="gu-filter">
          <option value="">전체</option>
        </select>
      </div>

      <div class="stats" id="stats">
        <span class="stat-chip"><span id="visible-count">0</span>곳 표시</span>
      </div>
    </div>

    <div class="list" id="list"></div>

    <footer class="sidebar-footer">
      <span>Data · HIRA (건강보험심사평가원)</span>
      <span>Map · OpenStreetMap</span>
    </footer>
  </aside>

  <main class="map-wrap">
    <div id="map"></div>
    <button class="toggle-sidebar" id="toggle-sidebar" title="사이드바 토글">
      <svg viewBox="0 0 24 24" width="20" height="20">
        <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </main>

  <script src="app.js"></script>
</body>
</html>
